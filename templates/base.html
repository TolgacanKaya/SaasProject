<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}T-Randevu SaaS{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        body { font-family: 'Inter', sans-serif; }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-indigo-500 selection:text-white flex flex-col min-h-screen">

    <nav class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-md border-b border-slate-800 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">

                <a href="{% url 'ana_sayfa' %}" class="text-2xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-blue-400 hover:from-indigo-300 hover:to-blue-300 transition-all">
                    T-Randevu
                </a>

                <div class="flex items-center gap-4 sm:gap-6">
                    <a href="{% url 'kesfet' %}" class="text-slate-300 hover:text-white font-medium flex items-center gap-2 transition-colors duration-200">
                        <span class="text-lg hidden sm:inline-block">🔍</span>İşletmeleri Keşfet
                    </a>

                    <div class="h-6 w-px bg-slate-700 hidden sm:block"></div>

                    {% if request.user.is_authenticated %}
                        <a href="{% url 'dashboard' %}" class="px-5 sm:px-6 py-2.5 rounded-full bg-gradient-to-r from-indigo-600 to-blue-500 text-white font-bold text-sm shadow-lg shadow-indigo-500/30 hover:-translate-y-0.5 transition-all duration-300">
                            Panele Git →
                        </a>
                    {% else %}
                        <a href="{% url 'giris' %}" class="text-slate-300 hover:text-white font-medium transition-colors text-sm hidden sm:block">
                            Giriş Yap
                        </a>
                        <a href="{% url 'kayit' %}" class="px-5 sm:px-6 py-2.5 rounded-full bg-gradient-to-r from-indigo-600 to-blue-500 text-white font-bold text-sm shadow-lg shadow-indigo-500/30 hover:-translate-y-0.5 transition-all duration-300">
                            Hemen Başla
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex flex-col">
        {% block content %}
        {% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
