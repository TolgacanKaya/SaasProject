<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}T-Randevu SaaS{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'ana_sayfa' %}">T-Randevu</a>

            <div class="d-flex align-items-center">
                <a class="nav-link text-white fw-bold me-4 text-decoration-none" href="{% url 'kesfet' %}">🔍 İşletmeleri Keşfet</a>

                {% if request.user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="btn btn-primary btn-sm fw-bold">Panele Git</a>
                {% else %}
                    <a href="{% url 'giris' %}" class="btn btn-outline-light btn-sm me-2">Giriş Yap</a>
                    <a href="{% url 'kayit' %}" class="btn btn-primary btn-sm fw-bold">Hemen Başla</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
