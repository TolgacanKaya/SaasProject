{% extends 'base.html' %}
{% block title %}Şifremi Unuttum | T-Randevu{% endblock %}

{% block content %}
<div class="relative min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 overflow-hidden">

    <!-- Lofi Arka Plan Işıkları -->
    <div class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center">
        <div class="absolute w-[400px] h-[400px] bg-indigo-500/10 rounded-full blur-[100px] animate-pulse"></div>
    </div>

    <div class="relative z-10 w-full max-w-md bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-white p-8 sm:p-10 text-center">

        <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border border-indigo-100 transform hover:scale-105 transition-transform duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
        </div>

        <h2 class="text-3xl font-extrabold text-slate-900 mb-3 tracking-tight">Şifrenizi Mi Unuttunuz?</h2>
        <p class="text-slate-500 mb-8 font-medium leading-relaxed">Sisteme kayıtlı e-posta adresinizi girin, size şifre sıfırlama bağlantısı gönderelim.</p>

        <form method="POST" class="space-y-6 text-left">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">E-Posta Adresiniz</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-slate-400 group-focus-within:text-indigo-500 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" /></svg>
                    </div>
                    <input type="email" name="email" required placeholder="ornek@sirket.com" class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-sm">
                </div>
            </div>

            <button type="submit" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-blue-500 text-white font-extrabold text-lg rounded-xl shadow-xl shadow-indigo-500/30 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                Bağlantıyı Gönder
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" /></svg>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100">
            <a href="{% url 'giris' %}" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors flex items-center justify-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" /></svg>
                Giriş Sayfasına Dön
            </a>
        </div>
    </div>
</div>
{% endblock %}
